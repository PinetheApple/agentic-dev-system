# Only harness-aware file in the config tree (ticket 002). Target: claude-code.

[tier_model]
fast = "claude-haiku-4-5"
standard = "claude-sonnet-5"
deep = "claude-opus-4-8"

[run]
cmd = ["claude", "-p"]

[capabilities]
flags = ["tools", "allowedtools-cli", "streaming", "json_output"]

# ticket 011: identical containment policy across harnesses — this table is
# byte-identical between harness.toml and harness.opencode.toml on purpose.
[sandbox]
enabled = true
deny_egress = true
mem_max = "2G"
cpu_quota = "150%"
tasks_max = 512
wall_clock = 600
