# Only harness-aware file in the config tree (ticket 002). Target: claude-code.
# `claude-sonnet-5` / `claude-opus-4-8` / `claude-haiku-4-5` are `claude` CLI
# model aliases (resolved by `claude --model <alias>`), not hardcoded
# provider snapshot ids — swap them for pinned ids if you need reproducible
# model versions across runs.

[tier_model]
fast = "claude-haiku-4-5"
standard = "claude-sonnet-5"
deep = "claude-opus-4-8"

[run]
cmd = ["claude", "-p"]

[capabilities]
flags = ["tools", "allowedtools-cli", "streaming", "json_output"]

# ticket 011: the driver-wrap jail (ads/sandbox.py) contains each run() with a
# bubblewrap FS jail (rw = the task's worktree only), tmpfs-masked host secrets
# (~/.ssh, ~/.aws, ~/.gnupg, ~/.config/gh), a scrubbed env (--clearenv + a small
# allowlist), and cgroup resource caps. `deny_egress = false` KEEPS host network
# so `claude -p` can reach the Anthropic API — bwrap only drops the network
# namespace when deny_egress = true (that mode is for local/offline models).
#
# Because the jail scrubs env and masks $HOME, claude's own credentials must be
# handed back in narrowly: rw_paths binds claude's cred/state dir (it reads AND
# writes session state there) and env_allowlist re-admits the API-key env var if
# you auth that way. This is a NAMED harness carve-out — ~/.ssh/~/.aws stay masked.
#
# Residual (honest): with network allowed AND the claude token readable in-jail,
# a compromised agent tool could exfiltrate THAT token (payload bounded to it +
# the worktree — everything else is masked). Closing that needs harness-native
# tool sandboxing (dec 9, SANDBOX_NATIVE_CAPABILITY) — tracked, not built here.
# Still strictly stronger than a disabled jail (host FS, secrets, fork-bombs all
# contained). For maximum isolation, run the whole driver inside a container
# that has network but no host home.
[sandbox]
enabled = true
deny_egress = false
mem_max = "4G"
cpu_quota = "200%"
tasks_max = 512
caps_required = false
rw_paths = ["~/.claude"]
env_allowlist = ["PATH", "HOME", "LANG", "LC_ALL", "TERM", "TMPDIR", "ANTHROPIC_API_KEY", "CLAUDE_CODE_OAUTH_TOKEN"]

# --- native posture (dec 9, alternative to the driver-wrap [sandbox] above) ---
# Use this instead of [sandbox] when the WHOLE ads driver already runs inside
# an outer container/VM that owns the real host-level jail (network egress
# deny, no host $HOME, etc). In that setup the driver's own bwrap wrap is
# redundant, so the harness self-declares containment via `sandbox-native`
# and the driver skips its inner wrap (ads/sandbox.py's SANDBOX_NATIVE_CAPABILITY).
# [native] then adds claude-code's own least-authority flags as
# defense-in-depth INSIDE that outer boundary — NOT a standalone host jail:
# `--permission-mode`/`--disallowedTools` gate tool *invocation*, not raw
# filesystem reads of a path, so a rogue Bash can still read anything the
# outer container exposes. To switch to this posture, uncomment below AND:
#   [capabilities] flags = [..., "sandbox-native"]
#   [sandbox] enabled = false   (explicit — the driver won't wrap in native
#                                 mode anyway, but don't leave it ambiguous)
#
# [native]
# # "acceptEdits": claude auto-accepts file edit tool calls without an
# # interactive prompt, but still refuses any tool not otherwise allowed —
# # good for unattended runs where you still want an allowlist/denylist to
# # bite. See `claude --help` for the full set of documented modes.
# permission_mode = "acceptEdits"
# disallowed_tools = ["WebFetch", "WebSearch"]
